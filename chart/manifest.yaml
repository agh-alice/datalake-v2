apiVersion: v1
kind: Namespace
metadata:
  name: cnpg-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: v1
kind: Namespace
metadata:
  name: argo-workflows
---
apiVersion: v1
kind: Namespace
metadata:
  name: lakekeeper
---
apiVersion: v1
kind: Namespace
metadata:
  name: landing-db
---
apiVersion: v1
kind: Secret
metadata:
  name: lakekeeper-pg-encryption
  namespace: lakekeeper
stringData:
  encryptionKey: kind-only-not-a-secret
type: Opaque
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: lakekeeper-db
  namespace: lakekeeper
spec:
  bootstrap:
    initdb:
      database: lakekeeper
      owner: lakekeeper
  imageName: ghcr.io/cloudnative-pg/postgresql:16.6
  instances: 2
  monitoring:
    enablePodMonitor: false
  storage:
    size: 5Gi
