apiVersion: v1
kind: Namespace
metadata:
  name: cnpg-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: v1
kind: Namespace
metadata:
  name: argo-workflows
---
apiVersion: v1
kind: Namespace
metadata:
  name: lakekeeper
---
apiVersion: v1
kind: Namespace
metadata:
  name: landing-db
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline-runner
  namespace: argo-workflows
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pipeline-runner
  namespace: argo-workflows
rules:
  - apiGroups:
      - argoproj.io
    resources:
      - workflowtaskresults
    verbs:
      - create
      - patch
  - apiGroups:
      - argoproj.io
    resources:
      - workflows
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-runner
  namespace: argo-workflows
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pipeline-runner
subjects:
  - kind: ServiceAccount
    name: pipeline-runner
    namespace: argo-workflows
---
apiVersion: v1
kind: Service
metadata:
  name: echo-receiver
  namespace: monitoring
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: echo-receiver
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-receiver
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo-receiver
  template:
    metadata:
      labels:
        app: echo-receiver
    spec:
      containers:
        - args:
            - |
              import http.server

              class Handler(http.server.BaseHTTPRequestHandler):
                  def do_POST(self):
                      length = int(self.headers.get("Content-Length", 0) or 0)
                      body = self.rfile.read(length)
                      print("ECHO-RECEIVER POST path=" + self.path, flush=True)
                      print(body.decode("utf-8", "replace"), flush=True)
                      self.send_response(200)
                      # Alertmanager's Slack notifier requires literal "ok" or {"ok":true} in response body
                      response_body = b"ok"
                      self.send_header("Content-Length", str(len(response_body)))
                      self.end_headers()
                      self.wfile.write(response_body)

                  def log_message(self, fmt, *args):
                      pass

              http.server.HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
          command:
            - python3
            - -c
          image: ghcr.io/agh-alice/datalake-v2-ingest@sha256:898ae4ee94a4a255ee8e973dce1a3fe65a226f2d08cb0b25a243862e06948767
          name: echo-receiver
          ports:
            - containerPort: 8080
          readinessProbe:
            initialDelaySeconds: 2
            periodSeconds: 5
            tcpSocket:
              port: 8080
          resources:
            limits:
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: lakekeeper-db
  namespace: lakekeeper
spec:
  bootstrap:
    initdb:
      database: lakekeeper
      owner: lakekeeper
  imageName: ghcr.io/cloudnative-pg/postgresql:16.6@sha256:53be6d727c7b3cf0df2b147f7ce7cdd31d37fd285314294871a4ccc3837b6872
  instances: 2
  monitoring:
    enablePodMonitor: true
  storage:
    size: 5Gi
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: mon-data
  namespace: landing-db
spec:
  bootstrap:
    initdb:
      database: mon_data
      owner: mon_user
  imageName: ghcr.io/cloudnative-pg/postgresql:16.6@sha256:53be6d727c7b3cf0df2b147f7ce7cdd31d37fd285314294871a4ccc3837b6872
  instances: 1
  monitoring:
    enablePodMonitor: true
  postgresql:
    parameters:
      max_connections: "60"
  storage:
    size: 2Gi
---
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: hello
  namespace: argo-workflows
spec:
  concurrencyPolicy: Forbid
  schedules:
    - '*/5 * * * *'
  workflowSpec:
    entrypoint: main
    serviceAccountName: pipeline-runner
    templates:
      - container:
          command:
            - sh
            - -c
            - echo hello from datalake-v2 && date
          image: busybox@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
        name: main
    ttlStrategy:
      secondsAfterCompletion: 3600
---
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: ingest-nightly
  namespace: argo-workflows
spec:
  concurrencyPolicy: Forbid
  schedules:
    - 0 */6 * * *
  workflowSpec:
    activeDeadlineSeconds: 21600
    entrypoint: main
    serviceAccountName: pipeline-runner
    templates:
      - dag:
          tasks:
            - name: run-nightly
              template: run-nightly
            - dependencies:
                - run-nightly
              name: run-retention
              template: run-retention
            - dependencies:
                - run-retention
              name: check-freshness
              template: check-freshness
        name: main
      - container:
          args:
            - run-nightly
          envFrom:
            - secretRef:
                name: ingest-env
          image: ghcr.io/agh-alice/datalake-v2-ingest@sha256:898ae4ee94a4a255ee8e973dce1a3fe65a226f2d08cb0b25a243862e06948767
        name: run-nightly
      - container:
          args:
            - run-retention
          envFrom:
            - secretRef:
                name: ingest-env
          image: ghcr.io/agh-alice/datalake-v2-ingest@sha256:898ae4ee94a4a255ee8e973dce1a3fe65a226f2d08cb0b25a243862e06948767
        name: run-retention
      - container:
          args:
            - check-freshness
          envFrom:
            - secretRef:
                name: ingest-env
          image: ghcr.io/agh-alice/datalake-v2-ingest@sha256:898ae4ee94a4a255ee8e973dce1a3fe65a226f2d08cb0b25a243862e06948767
        name: check-freshness
    ttlStrategy:
      secondsAfterCompletion: 86400
---
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: ingest-sitesonar
  namespace: argo-workflows
spec:
  concurrencyPolicy: Forbid
  schedules:
    - 30 */6 * * *
  workflowSpec:
    activeDeadlineSeconds: 21600
    entrypoint: main
    serviceAccountName: pipeline-runner
    templates:
      - container:
          args:
            - run-sitesonar
          envFrom:
            - secretRef:
                name: ingest-env
          image: ghcr.io/agh-alice/datalake-v2-ingest@sha256:898ae4ee94a4a255ee8e973dce1a3fe65a226f2d08cb0b25a243862e06948767
        name: main
    ttlStrategy:
      secondsAfterCompletion: 86400
---
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: ingest-maintenance
  namespace: argo-workflows
spec:
  concurrencyPolicy: Forbid
  schedules:
    - 0 4 * * 0
  workflowSpec:
    activeDeadlineSeconds: 3600
    entrypoint: main
    serviceAccountName: pipeline-runner
    templates:
      - dag:
          tasks:
            - name: run-maintenance
              template: run-maintenance
            - dependencies:
                - run-maintenance
              name: run-trino-maintenance
              template: run-trino-maintenance
        name: main
      - container:
          args:
            - run-maintenance
          envFrom:
            - secretRef:
                name: ingest-env
          image: ghcr.io/agh-alice/datalake-v2-ingest@sha256:898ae4ee94a4a255ee8e973dce1a3fe65a226f2d08cb0b25a243862e06948767
        name: run-maintenance
      - container:
          args:
            - run-trino-maintenance
          envFrom:
            - secretRef:
                name: ingest-env
          image: ghcr.io/agh-alice/datalake-v2-ingest@sha256:898ae4ee94a4a255ee8e973dce1a3fe65a226f2d08cb0b25a243862e06948767
        name: run-trino-maintenance
    ttlStrategy:
      secondsAfterCompletion: 86400
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: datalake-alerts
  namespace: monitoring
spec:
  groups:
    - name: datalake
      rules:
        - alert: LandingDBXidAgeHigh
          annotations:
            description: cnpg_pg_database_xid_age has exceeded 1e9 for 30m. Unmitigated, this repeats E4 -- the landing DB hit transaction-ID wraparound protection and refused all writes for two months, unnoticed, because orphaned temp tables pinned the frozen-XID horizon.
            incident: E4
            runbook_url: docs/runbooks/xid-wraparound.md
            summary: Landing DB transaction-ID age approaching wraparound
          expr: max(cnpg_pg_database_xid_age) > 1000000000
          for: 30m
          labels:
            severity: critical
        - alert: CNPGClusterUnhealthy
          annotations:
            description: cnpg_pg_replication_streaming_replicas (max across lakekeeper-db's pods, i.e. the primary's view) has been below 1 for 15m -- HA is degraded. E5 was the RAID0-over-4-volumes VM with zero redundancy that CNPG replaces.
            incident: E5
            summary: CNPG cluster lakekeeper-db has fewer streaming replicas than expected
          expr: max by (namespace) (cnpg_pg_replication_streaming_replicas{namespace="lakekeeper"}) < 1
          for: 15m
          labels:
            severity: critical
        - alert: NodeDiskPressure
          annotations:
            description: A node filesystem has had less than 20% free space for 30m. E5 included a root disk left 100% full by one unrotated 27GB Docker log, unnoticed until someone asked where the data was.
            incident: E5
            summary: Node filesystem below 20% free
          expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes) < 0.2
          for: 30m
          labels:
            severity: warning
        - alert: ArgoAppOutOfSync
          annotations:
            description: 'argocd_app_info reports sync_status != Synced for 1h -- the live cluster no longer matches the tracked Git source. E2 was exactly this class of silent drift: a Dec-2023 image running in production instead of the repo''s code.'
            incident: E2
            summary: ArgoCD Application out of sync for over an hour
          expr: argocd_app_info{sync_status!="Synced"} == 1
          for: 1h
          labels:
            severity: warning
    - name: datalake-pipeline
      rules:
        - alert: WorkflowFailed
          annotations:
            description: 'argo_workflows_total_count{exported_namespace,phase} is a per-namespace, per-phase COUNTER (verified live against the controller''s own /metrics AND against Prometheus''s own stored series, 2026-07-12 -- see this group''s header comment on why `exported_namespace`, not the scraped `namespace` label, carries the workflow''s actual namespace) -- increase() over 1h counts workflows that TRANSITIONED into Failed or Error during that window, which is what "entering Failed/Error in the last hour" means; a gauge read (argo_workflows_gauge, also present but with NO namespace label at all on this controller) would miss a transition already reaped by ttlStrategy before the next scrape, or hide which namespace it belonged to. Covers every Workflow in ns argo-workflows: ingest-nightly (both its run-nightly and run-retention steps -- see RetentionUnverifiedRows below for one specific run-retention failure cause), ingest-sitesonar, ingest-maintenance, and hello. E1 was exactly the un-alerted failure class this closes: 68 consecutive nightly failures, unnoticed, because nothing watched workflow/CronWorkflow outcomes (deliverables/2026-07-12-datalake-v2-design.md, minimum alert set: "workflow/CronWorkflow failure (E1)").'
            incident: E1
            note: phase="Error" has no time series until some workflow has actually entered that phase at least once (Prometheus only creates a series on first observation, verified live -- only Failed/Running/Succeeded existed at verification time) -- absent is expected, not broken, until then.
            summary: An Argo Workflow in argo-workflows entered Failed/Error in the last hour
          expr: increase(argo_workflows_total_count{exported_namespace="argo-workflows", phase=~"Failed|Error"}[1h]) > 0
          for: 5m
          labels:
            severity: warning
        - alert: IcebergIngestStale
          annotations:
            description: 'argo_workflows_cronworkflows_triggered_total{name="ingest-nightly"} is the ONLY controller metric carrying a per-CronWorkflow `name` label (verified live, 2026-07-12 -- see this group''s header comment). It counts TRIGGERS, not successes, so this expr detects "the 02:00 schedule stopped firing at all" (controller down, CronWorkflow suspended/deleted/renamed, ns issue) within a 26h window (24h nightly cadence + 2h buffer) -- increase()==0 means zero triggers landed in that window. It deliberately does NOT try to detect "triggered nightly but every run failed" -- that is a DIFFERENT failure mode, already covered within 1h (not 26h) by WorkflowFailed above, since a failing ingest-nightly Workflow increments argo_workflows_total_count{phase="Failed"} regardless of which CronWorkflow spawned it, and no per-workflow-name success/failure metric exists on this controller version to scope that more tightly (verified live -- see header comment). Together the two alerts split "pipeline didn''t run at all" (this one) from "pipeline ran and failed" (WorkflowFailed) -- the most honest split obtainable from this controller version''s real metric label surface. Design''s minimum alert set: "ingestion watermark lag >24h (E4)" -- deliverables/2026-07-12-datalake-v2-design.md.'
            incident: E4
            summary: ingest-nightly has not even been triggered in 26h
          expr: increase(argo_workflows_cronworkflows_triggered_total{name="ingest-nightly", exported_namespace="argo-workflows"}[26h]) == 0
          for: 5m
          labels:
            severity: critical
        - alert: RetentionUnverifiedRows
          annotations:
            description: 'Deliberate no-new-components decision (Plan 2 Task 5): retention.py (design D5, provenance E4/E6) exposes NO metric of its own -- a Pushgateway-fed unverified_count gauge was rejected because it adds a new component to the platform purely to surface one exit code. Instead, retention.run()''s exit_code() (ingest/src/alice_ingest/retention.py) returns non-zero IF AND ONLY IF total.unverified > 0 summed across every landing table, which fails the run-retention container, which fails the owning ingest-nightly Workflow -- the EXACT SAME Failed-phase transition WorkflowFailed above already detects (there is no per-workflow-name metric on this controller to scope a narrower expr against, verified live -- see this group''s header comment). This alert therefore has NO independent Prometheus signal: its expr is identical to WorkflowFailed''s, and it will always co-fire with WorkflowFailed, never alone, for this specific cause among the several WorkflowFailed''s broader condition can match. It exists as a separately named, runbook-linkable entry -- so "retention''s safety net tripped" is discoverable by name -- rather than folding this failure mode silently into WorkflowFailed''s generic text. To CONFIRM unverified>0 was the actual cause (vs. a different workflow, or ingest-nightly''s run-nightly step, failing instead), check the failed run-retention pod''s logs for the `RETENTION kept=<n> deleted=<n> unverified=<n>` summary line (unverified>0) or a per-table `RETENTION table=<t> ... unverified=<n>` line (retention.py''s format_summary()/run()). unverified>0 means old landing rows exist that retention could NOT verify are safely replicated to Iceberg yet -- retention kept them rather than risk E4''s class of data loss (deleting rows an interrupted/lagging ingest never finished writing).'
            incident: E4
            summary: A pipeline workflow failed -- check whether retention's unverified>0 guard was the cause
          expr: increase(argo_workflows_total_count{exported_namespace="argo-workflows", phase=~"Failed|Error"}[1h]) > 0
          for: 5m
          labels:
            severity: warning
        - alert: IcebergSnapshotStale
          annotations:
            description: 'Deliberate no-new-components decision (Plan 3 Task 3): the data-layer freshness gate (alice_ingest.maintenance. run_freshness_check(), wired as ingest-nightly''s third DAG step `check-freshness`, chart/templates/ingest-cronworkflows.yaml) exposes NO metric of its own -- it fails its own container on staleness, which fails the owning Workflow, which this PrometheusRule group already detects via WorkflowFailed. This alert has NO independent Prometheus signal: same expr as WorkflowFailed, always co-firing with it, never alone, for this specific cause among WorkflowFailed''s broader condition. A core table (job_info/trace/mon_jdls_parsed) reads STALE when its newest Iceberg snapshot (`max(committed_at)` from `lake.alice."<table>$snapshots"`) is older than 26h, or MISSING if the table has no snapshot at all -- either means the data-layer has nothing recent to show even if every upstream step reported success.'
            incident: E4
            summary: A pipeline workflow failed -- check whether the data-layer freshness gate (check-freshness) was the cause
          expr: increase(argo_workflows_total_count{exported_namespace="argo-workflows", phase=~"Failed|Error"}[1h]) > 0
          for: 5m
          labels:
            severity: warning
        - alert: WorkflowChronicFailure
          annotations:
            description: argo_workflows_total_count{exported_namespace="argo-workflows", phase=~"Failed|Error"} has accumulated 3 or more Failed/Error transitions in a rolling 7-day window. WorkflowFailed (above) already pages on every individual failure at `warning`; this rule escalates to `critical` once failures are a pattern, not an isolated blip -- unmitigated, this repeats E1 (68 consecutive nightly failures, unnoticed for months, because nothing distinguished "failed once" from "failing every night").
            incident: E1
            summary: 3+ Argo Workflow failures in argo-workflows within 7 days -- chronic, not a one-off
          expr: increase(argo_workflows_total_count{exported_namespace="argo-workflows", phase=~"Failed|Error"}[7d]) >= 3
          for: 5m
          labels:
            severity: critical
        - alert: SiteSonarStale
          annotations:
            description: 'Same trigger-staleness shape as IcebergIngestStale (this group, above) but for the `ingest-sitesonar` CronWorkflow (chart/values.yaml''s `ingest.schedules.sitesonar`, daily 03:00 default): 24h cadence + 2h buffer. Detects "the schedule stopped firing at all" (controller down, CronWorkflow suspended/deleted/renamed); does NOT detect "triggered but failed", which WorkflowFailed already covers within 1h. `warning`, not `critical`: site-sonar populates auxiliary metadata (site_sonar table), not the core job_info/trace/ mon_jdls_parsed tables IcebergIngestStale protects at `critical`.'
            incident: E4
            summary: ingest-sitesonar has not even been triggered in 26h
          expr: increase(argo_workflows_cronworkflows_triggered_total{name="ingest-sitesonar", exported_namespace="argo-workflows"}[26h]) == 0
          for: 5m
          labels:
            severity: warning
        - alert: IcebergMaintenanceStale
          annotations:
            description: argo_workflows_cronworkflows_triggered_total{name="ingest-maintenance"} counts TRIGGERS, not successes or real-vs-deferred runs (see this alert's own annotation above for the deferral blind spot this does NOT cover). increase()==0 over 8d (7d weekly cadence + 1d buffer) means the Sunday 04:00 schedule stopped firing entirely -- controller down, CronWorkflow suspended/ deleted/renamed, or an RBAC/namespace issue.
            incident: E4-adjacent
            summary: ingest-maintenance has not even been triggered in 8 days
          expr: increase(argo_workflows_cronworkflows_triggered_total{name="ingest-maintenance", exported_namespace="argo-workflows"}[8d]) == 0
          for: 5m
          labels:
            severity: warning
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: argocd-application-controller
  namespace: monitoring
spec:
  endpoints:
    - interval: 30s
      port: http-metrics
  namespaceSelector:
    matchNames:
      - argocd
  selector:
    matchLabels:
      app.kubernetes.io/component: application-controller
      app.kubernetes.io/name: argocd-metrics
