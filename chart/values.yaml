namespaces:
  - cnpg-system
  - external-secrets
  - monitoring
  - argo-workflows
  - lakekeeper
  - landing-db

lakekeeperDb:
  instances: 2
  storageSize: 5Gi
  enablePodMonitor: false   # true in Task 6

# Lakekeeper's secretBackend.type=Postgres requires an encryption key for
# secrets it stores in Postgres. The upstream chart's own value auto-generates
# one via helm's `lookup`, which ArgoCD's client-side `helm template` render
# does not support (see chart values.yaml comment, referencing
# argoproj/argo-cd#5202) -- so we must supply a pre-created Secret ourselves.
# kind: inline placeholder (not a secret). cyfronet: sourced via ExternalSecret,
# set this to "" here so chart/templates/lakekeeper-pg-encryption.yaml is skipped.
lakekeeperPgEncryptionKey: ""
