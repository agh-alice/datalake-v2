namespaces:
  - cnpg-system
  - external-secrets
  - monitoring
  - argo-workflows
  - lakekeeper
  - landing-db

# Digest-pinned per no-mutable-tags convention. Verified via:
#   docker pull busybox:1.36 && docker inspect busybox:1.36 \
#     --format '{{index .RepoDigests 0}}'
# (Task 7). Consumed by chart/templates/hello-cronworkflow.yaml.
#
# ingest: built from ingest/ (Plan 2 Task 2); ghcr.io/agh-alice/datalake-v2-ingest
# is public, digest published by .github/workflows/ingest-image.yaml's job
# summary on every push to main touching ingest/**. Manual pin (not
# auto-committed) is deliberate -- the chart change is the deploy and stays
# reviewable in the rendered-branch diff. Pinned from CI run 29213645823
# (commit 24af764, ingest-image workflow, Plan 3 Task 2 review-fix wave:
# apply-views drift detection + --strict gate + contract_columns.py
# regeneration procedure -- see views.py's module docstring, "Drift
# detection"; the prior pin [sha256:131fc3e9...] predates it); verified
# resolvable via the GHCR registry API (`GET /v2/agh-alice/datalake-v2-
# ingest/manifests/<digest>` with an anonymous pull token, HTTP 200) --
# same index-manifest structure as the previous pin. Consumed by
# chart/templates/ingest-cronworkflows.yaml (Task 4 nightly/sitesonar,
# Task 5 maintenance).
images:
  busybox: "busybox@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662"
  ingest: "ghcr.io/agh-alice/datalake-v2-ingest@sha256:4e1c1127a11384c29cc2156a88ea6e8c289e6c14e1a1211c0de20f228353ed7b"

# enablePodMonitor drives Cluster.spec.monitoring.enablePodMonitor (see
# chart/templates/{lakekeeper-db,landing-db}.yaml). CNPG 0.28.0 marks that
# field deprecated ("will be removed in an upcoming release") but it is
# still present and functional in the CRD schema (verified via `kubectl
# explain cluster.spec.monitoring.enablePodMonitor`, Task 6) -- used as-is;
# switch to hand-authored PodMonitor resources if a future CNPG bump drops it.
lakekeeperDb:
  instances: 2
  storageSize: 5Gi
  enablePodMonitor: true

landingDb:
  instances: 3
  storageSize: 50Gi
  maxConnections: "60"
  enablePodMonitor: true

# Lakekeeper's Postgres secret-store encryption key lives in Secret
# lakekeeper/lakekeeper-pg-encryption -- created by hack/kind-up.sh on kind
# (random per cluster) and by ExternalSecret on cyfronet. Never templated in
# this chart (no-secrets-in-rendered-branches constraint; upstream
# auto-generation relies on helm lookup which ArgoCD render does not support,
# argoproj/argo-cd#5202).

# CronWorkflow scheduling (Plan 2 Task 4). Consumed by
# chart/templates/ingest-cronworkflows.yaml's `.Values.ingest.schedules.*`.
# retentionDays documents the retention window operators must keep in sync
# with the ingest-env Secret's RETENTION_DAYS key (harness-created --
# hack/kind-up.sh on kind, ESO on cyfronet -- same no-secrets-in-rendered-
# branches convention as lakekeeperDb's encryption key above); it is NOT
# consumed by any chart template directly, since the CronWorkflow's
# run-retention step gets RETENTION_DAYS via envFrom the Secret, not from
# values -- this field exists so the intended value is visible in Git even
# though the actual runtime value is set out-of-band.
ingest:
  schedules:
    nightly: "0 2 * * *"
    sitesonar: "0 3 * * *"
    # Plan 2 Task 5: weekly Iceberg snapshot expiry (ingest/src/alice_ingest/
    # maintenance.py). Sunday 04:00 -- outside nightly's 02:00 and
    # sitesonar's 03:00 windows so it never contends with either for the
    # landing-DB/Lakekeeper connection, and weekly (not nightly) because
    # snapshot accumulation across one day of nightly + sitesonar merges is
    # not large enough to need daily expiry (design D12).
    maintenance: "0 4 * * 0"
  # Final-review N5: every CronWorkflow's workflowSpec gets an
  # `activeDeadlineSeconds` ceiling -- a stuck pod (network partition on a
  # PG/Lakekeeper/S3 call, a hung site-sonar HTTP fetch, etc.) previously
  # had no upper bound at all and would run (and hold `concurrencyPolicy:
  # Forbid`'s slot) indefinitely, silently blocking every subsequent
  # scheduled tick. Defaults sized to each job's normal shape: nightly and
  # sitesonar at 6h (21600s -- generous headroom over the ~1-2 min kind
  # runs in task-*-report.md's acceptance timings, but bounded against a
  # genuine hang; sitesonar's real cyfronet backlog is the larger of the
  # two, per sitesonar.py's module docstring), maintenance at 1h (3600s --
  # a single expire_snapshots() pass per table, no external HTTP fetch).
  # Values-driven (not hardcoded in the template) so an environment can
  # override per its own SLA without a chart change.
  activeDeadlineSeconds:
    nightly: 21600
    sitesonar: 21600
    maintenance: 3600
  retentionDays: "14"
