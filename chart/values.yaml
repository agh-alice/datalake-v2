namespaces:
  - cnpg-system
  - external-secrets
  - monitoring
  - argo-workflows
  - lakekeeper
  - landing-db

lakekeeperDb:
  instances: 2
  storageSize: 5Gi
  enablePodMonitor: false   # true in Task 6

# Lakekeeper's Postgres secret-store encryption key lives in Secret
# lakekeeper/lakekeeper-pg-encryption -- created by hack/kind-up.sh on kind
# (random per cluster) and by ExternalSecret on cyfronet. Never templated in
# this chart (no-secrets-in-rendered-branches constraint; upstream
# auto-generation relies on helm lookup which ArgoCD render does not support,
# argoproj/argo-cd#5202).
