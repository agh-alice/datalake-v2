# Design D11 — failure-derived alert set (E4/E5/E2). Plan 2 appends
# workflow/staleness alerts to this same PrometheusRule group.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: datalake-alerts
  namespace: monitoring
spec:
  groups:
    - name: datalake
      rules:
        - alert: LandingDBXidAgeHigh
          expr: max(cnpg_pg_database_xid_age) > 1000000000
          for: 30m
          labels:
            severity: critical
          annotations:
            summary: Landing DB transaction-ID age approaching wraparound
            description: >-
              cnpg_pg_database_xid_age has exceeded 1e9 for 30m. Unmitigated,
              this repeats E4 -- the landing DB hit transaction-ID
              wraparound protection and refused all writes for two months,
              unnoticed, because orphaned temp tables pinned the frozen-XID
              horizon.
            incident: E4
            runbook_url: docs/runbooks/xid-wraparound.md

        # Task 6 review finding: cnpg_pg_replication_streaming_replicas is reported
        # per-pod (each pod's own count of replicas streaming *from* it), not
        # per-cluster. A cascading-free CNPG cluster's replica pods always report 0
        # (nothing streams downstream of a replica) and a single-instance cluster has
        # no replicas by design -- the original `< 1` expr fired on every healthy
        # replica pod and on kind's deliberately single-instance mon-data. Fixed by
        # taking the max across each cluster's pods (the primary's count is the
        # cluster's true streaming-replica count) and comparing against a
        # values-driven threshold (instances - 1), rendered only when the cluster is
        # actually configured for HA (instances > 1) -- on kind, landingDb.instances
        # is 1 (values-kind.yaml), so this block is intentionally absent for mon-data.
        #
        # Deviation from plan: cnpg_pg_replication_streaming_replicas carries no
        # `cluster` label (verified live via Prometheus /api/v1/series -- only
        # container/endpoint/instance/job/namespace/pod are present; `job` is
        # "<namespace>/<cluster>" and only cnpg_collector_up, a different metric,
        # carries a `cluster` label). Each CNPG Cluster in this chart lives in its
        # own dedicated namespace (lakekeeper-db.yaml -> ns lakekeeper, landing-db.yaml
        # -> ns landing-db; chart/templates/namespaces.yaml), so `namespace` uniquely
        # identifies the cluster and is used as the grouping/matching label instead.
        {{- if gt (int .Values.landingDb.instances) 1 }}
        - alert: CNPGClusterUnhealthy
          expr: max by (namespace) (cnpg_pg_replication_streaming_replicas{namespace="landing-db"}) < {{ sub (int .Values.landingDb.instances) 1 }}
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: CNPG cluster mon-data has fewer streaming replicas than expected
            description: >-
              cnpg_pg_replication_streaming_replicas (max across mon-data's pods,
              i.e. the primary's view) has been below
              {{ sub (int .Values.landingDb.instances) 1 }} for 15m -- HA is
              degraded. E5 was the RAID0-over-4-volumes VM with zero redundancy
              that CNPG replaces.
            incident: E5
        {{- end }}
        {{- if gt (int .Values.lakekeeperDb.instances) 1 }}
        - alert: CNPGClusterUnhealthy
          expr: max by (namespace) (cnpg_pg_replication_streaming_replicas{namespace="lakekeeper"}) < {{ sub (int .Values.lakekeeperDb.instances) 1 }}
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: CNPG cluster lakekeeper-db has fewer streaming replicas than expected
            description: >-
              cnpg_pg_replication_streaming_replicas (max across lakekeeper-db's
              pods, i.e. the primary's view) has been below
              {{ sub (int .Values.lakekeeperDb.instances) 1 }} for 15m -- HA is
              degraded. E5 was the RAID0-over-4-volumes VM with zero redundancy
              that CNPG replaces.
            incident: E5
        {{- end }}

        - alert: NodeDiskPressure
          expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes) < 0.2
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: Node filesystem below 20% free
            description: >-
              A node filesystem has had less than 20% free space for 30m.
              E5 included a root disk left 100% full by one unrotated
              27GB Docker log, unnoticed until someone asked where the
              data was.
            incident: E5

        - alert: ArgoAppOutOfSync
          expr: argocd_app_info{sync_status!="Synced"} == 1
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: ArgoCD Application out of sync for over an hour
            description: >-
              argocd_app_info reports sync_status != Synced for 1h -- the
              live cluster no longer matches the tracked Git source. E2 was
              exactly this class of silent drift: a Dec-2023 image running
              in production instead of the repo's code.
            incident: E2

    # Plan 2 Task 5 -- design D11's "minimum alert set" extended to the
    # ingestion pipeline itself (deliverables/2026-07-12-datalake-v2-design.md,
    # section 5: "workflow/CronWorkflow failure (E1); ... ingestion watermark
    # lag >24h (E4)"). Metric names verified LIVE against the real
    # argo-workflows-workflow-controller (chart argo-workflows v4,
    # release 4.0.7) on this kind cluster, 2026-07-12 -- NOT from docs/memory:
    # `kubectl -n argo-workflows exec deploy/argo-workflows-workflow-controller
    # -- wget ...` failed (no wget/curl in that image); port-forwarded the
    # controller's own Service instead (`argo-workflows-workflow-controller`,
    # port 8080 -> containerPort 9090 named "metrics" -- verified via
    # `kubectl get svc -o yaml`) and curled /metrics directly. Full label
    # inventory of every metric carrying a workflow/cronworkflow `name=` label
    # was enumerated too (`grep -E '\{[^}]*name='`): only
    # argo_workflows_cronworkflows_triggered_total carries one. No per-workflow
    # phase/succeeded/completion metric exists on this controller version.
    # kube-state-metrics (monitoring-kube-state-metrics, also live in this
    # cluster) was checked too and exposes nothing for the Workflow/
    # CronWorkflow CRDs -- ruling out the brief's hypothesized
    # "kube_job-style" fallback.
    #
    # exported_namespace, not namespace (found live, via Prometheus's own
    # /api/v1/query, after the rules first loaded -- not assumed): the
    # controller's ServiceMonitor (chart/templates in argo-workflows,
    # `honorLabels: false`, the chart default) makes Prometheus's own
    # scrape-target namespace win the plain `namespace` label, renaming the
    # SCRAPED METRIC's own `namespace="argo-workflows"` value (the
    # workflow's namespace -- what these alerts actually need) to
    # `exported_namespace`. On this cluster the controller pod happens to
    # run in the same namespace as the workflows it manages, so both labels
    # currently read "argo-workflows" and a plain `namespace=` filter would
    # have silently worked BY COINCIDENCE; every expr below uses
    # `exported_namespace` deliberately so it stays correct if that ever
    # changes (e.g. a cluster-scoped controller install, or workflows
    # spread across namespaces).
    - name: datalake-pipeline
      rules:
        - alert: WorkflowFailed
          expr: increase(argo_workflows_total_count{exported_namespace="argo-workflows", phase=~"Failed|Error"}[1h]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: An Argo Workflow in argo-workflows entered Failed/Error in the last hour
            description: >-
              argo_workflows_total_count{exported_namespace,phase} is a
              per-namespace, per-phase COUNTER (verified live against the
              controller's own /metrics AND against Prometheus's own stored
              series, 2026-07-12 -- see this group's header comment on why
              `exported_namespace`, not the scraped `namespace` label,
              carries the workflow's actual namespace) -- increase() over 1h
              counts workflows
              that TRANSITIONED into Failed or Error during that window,
              which is what "entering Failed/Error in the last hour" means;
              a gauge read (argo_workflows_gauge, also present but with NO
              namespace label at all on this controller) would miss a
              transition already reaped by ttlStrategy before the next
              scrape, or hide which namespace it belonged to. Covers every
              Workflow in ns argo-workflows: ingest-nightly (both its
              run-nightly and run-retention steps -- see RetentionUnverifiedRows
              below for one specific run-retention failure cause),
              ingest-sitesonar, ingest-maintenance, and hello. E1 was
              exactly the un-alerted failure class this closes: 68
              consecutive nightly failures, unnoticed, because nothing
              watched workflow/CronWorkflow outcomes
              (deliverables/2026-07-12-datalake-v2-design.md, minimum alert
              set: "workflow/CronWorkflow failure (E1)").
            note: >-
              phase="Error" has no time series until some workflow has
              actually entered that phase at least once (Prometheus only
              creates a series on first observation, verified live -- only
              Failed/Running/Succeeded existed at verification time) --
              absent is expected, not broken, until then.
            incident: E1

        - alert: IcebergIngestStale
          expr: increase(argo_workflows_cronworkflows_triggered_total{name="ingest-nightly", exported_namespace="argo-workflows"}[26h]) == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: ingest-nightly has not even been triggered in 26h
            description: >-
              argo_workflows_cronworkflows_triggered_total{name="ingest-nightly"}
              is the ONLY controller metric carrying a per-CronWorkflow
              `name` label (verified live, 2026-07-12 -- see this group's
              header comment). It counts TRIGGERS, not successes, so this
              expr detects "the 02:00 schedule stopped firing at all"
              (controller down, CronWorkflow suspended/deleted/renamed, ns
              issue) within a 26h window (24h nightly cadence + 2h buffer)
              -- increase()==0 means zero triggers landed in that window.
              It deliberately does NOT try to detect "triggered nightly but
              every run failed" -- that is a DIFFERENT failure mode,
              already covered within 1h (not 26h) by WorkflowFailed above,
              since a failing ingest-nightly Workflow increments
              argo_workflows_total_count{phase="Failed"} regardless of
              which CronWorkflow spawned it, and no per-workflow-name
              success/failure metric exists on this controller version to
              scope that more tightly (verified live -- see header
              comment). Together the two alerts split "pipeline didn't run
              at all" (this one) from "pipeline ran and failed" (WorkflowFailed)
              -- the most honest split obtainable from this controller
              version's real metric label surface. Design's minimum alert
              set: "ingestion watermark lag >24h (E4)" --
              deliverables/2026-07-12-datalake-v2-design.md.
            incident: E4

        - alert: RetentionUnverifiedRows
          expr: increase(argo_workflows_total_count{exported_namespace="argo-workflows", phase=~"Failed|Error"}[1h]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: A pipeline workflow failed -- check whether retention's unverified>0 guard was the cause
            description: >-
              Deliberate no-new-components decision (Plan 2 Task 5): retention.py
              (design D5, provenance E4/E6) exposes NO metric of its own --
              a Pushgateway-fed unverified_count gauge was rejected because
              it adds a new component to the platform purely to surface one
              exit code. Instead, retention.run()'s exit_code()
              (ingest/src/alice_ingest/retention.py) returns non-zero IF AND
              ONLY IF total.unverified > 0 summed across every landing
              table, which fails the run-retention container, which fails
              the owning ingest-nightly Workflow -- the EXACT SAME
              Failed-phase transition WorkflowFailed above already detects
              (there is no per-workflow-name metric on this controller to
              scope a narrower expr against, verified live -- see this
              group's header comment). This alert therefore has NO
              independent Prometheus signal: its expr is identical to
              WorkflowFailed's, and it will always co-fire with
              WorkflowFailed, never alone, for this specific cause among
              the several WorkflowFailed's broader condition can match. It
              exists as a separately named, runbook-linkable entry -- so
              "retention's safety net tripped" is discoverable by name --
              rather than folding this failure mode silently into
              WorkflowFailed's generic text. To CONFIRM unverified>0 was the
              actual cause (vs. a different workflow, or ingest-nightly's
              run-nightly step, failing instead), check the failed
              run-retention pod's logs for the `RETENTION kept=<n>
              deleted=<n> unverified=<n>` summary line (unverified>0) or a
              per-table `RETENTION table=<t> ... unverified=<n>` line
              (retention.py's format_summary()/run()). unverified>0 means
              old landing rows exist that retention could NOT verify are
              safely replicated to Iceberg yet -- retention kept them
              rather than risk E4's class of data loss (deleting rows an
              interrupted/lagging ingest never finished writing).
            incident: E4

        # Plan 3 Task 3 -- design D11 completion: the DATA-layer half of
        # snapshot staleness. IcebergIngestStale above detects "the nightly
        # CronWorkflow stopped firing at all" (a controller/schedule/RBAC
        # problem); it cannot detect "the CronWorkflow fired, every step
        # reported Succeeded, but no core table actually got a fresh Iceberg
        # snapshot" -- a gap that class of failure would leave completely
        # unalerted (Plan 2 Task 5's report: "D11 snapshot-staleness:
        # documented as composite; data-layer check -> Plan 3"). ingest-
        # nightly's third DAG step, check-freshness (chart/templates/ingest-
        # cronworkflows.yaml), closes that gap: `alice_ingest.maintenance.
        # run_freshness_check()` queries `max(committed_at)` from each core
        # table's `"<table>$snapshots"` Trino metadata table and exits
        # non-zero if any core table (job_info/trace/mon_jdls_parsed) is
        # missing or its newest snapshot is older than 26h -- which fails
        # the check-freshness container, which fails the owning ingest-
        # nightly Workflow, the EXACT SAME Failed-phase transition
        # WorkflowFailed above already detects. Same deliberate no-new-
        # components decision as RetentionUnverifiedRows directly above:
        # this alert's expr is identical to WorkflowFailed's (there is no
        # per-workflow-name/per-step metric on this controller version to
        # scope a narrower expr against -- see this group's header comment),
        # so it will always co-fire with WorkflowFailed, never alone, for
        # this specific cause among the several WorkflowFailed's broader
        # condition can match. It exists as a separately named, runbook-
        # linkable entry so "the data-layer freshness gate tripped" is
        # discoverable by name rather than folded into WorkflowFailed's
        # generic text. To CONFIRM staleness was the actual cause (vs. a
        # different workflow, or ingest-nightly's run-nightly/run-retention
        # steps, failing instead), check the failed check-freshness pod's
        # logs for a `FRESHNESS table=<t> status=STALE|MISSING ...` line and
        # the terminal `FRESHNESS CHECK FAILED: ...` summary (maintenance.py's
        # format_freshness_summary()/run_freshness_check()).
        - alert: IcebergSnapshotStale
          expr: increase(argo_workflows_total_count{exported_namespace="argo-workflows", phase=~"Failed|Error"}[1h]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: A pipeline workflow failed -- check whether the data-layer freshness gate (check-freshness) was the cause
            description: >-
              Deliberate no-new-components decision (Plan 3 Task 3): the
              data-layer freshness gate (alice_ingest.maintenance.
              run_freshness_check(), wired as ingest-nightly's third DAG step
              `check-freshness`, chart/templates/ingest-cronworkflows.yaml)
              exposes NO metric of its own -- it fails its own container on
              staleness, which fails the owning Workflow, which this
              PrometheusRule group already detects via WorkflowFailed. This
              alert has NO independent Prometheus signal: same expr as
              WorkflowFailed, always co-firing with it, never alone, for
              this specific cause among WorkflowFailed's broader condition.
              A core table (job_info/trace/mon_jdls_parsed) reads STALE when
              its newest Iceberg snapshot (`max(committed_at)` from
              `lake.alice."<table>$snapshots"`) is older than 26h, or
              MISSING if the table has no snapshot at all -- either means
              the data-layer has nothing recent to show even if every
              upstream step reported success.
            incident: E4

        # Plan 4 Task T2S1 -- the E1-streak escalation the P2 Task 5 review
        # demanded (68 consecutive unnoticed nightly failures is the
        # original E1 incident; WorkflowFailed above fires per-failure on a
        # 1h window but never distinguishes "failed once, recovered" from
        # "failing every single run for a week" -- this rule closes that
        # gap with a 7d/>=3 streak threshold at `critical`, one severity
        # step above WorkflowFailed's `warning`). Same metric, same
        # exported_namespace label as WorkflowFailed (this group's header
        # comment: argo_workflows_total_count{exported_namespace,phase} is
        # the only per-namespace per-phase Failed/Error signal this
        # controller version exposes -- re-verified live against this
        # cluster's own Prometheus, 2026-07-13: `exported_namespace` values
        # are exactly `argo-workflows`/`argocd`, matching the header
        # comment's claim, not assumed from memory).
        - alert: WorkflowChronicFailure
          expr: increase(argo_workflows_total_count{exported_namespace="argo-workflows", phase=~"Failed|Error"}[7d]) >= 3
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: 3+ Argo Workflow failures in argo-workflows within 7 days -- chronic, not a one-off
            description: >-
              argo_workflows_total_count{exported_namespace="argo-workflows",
              phase=~"Failed|Error"} has accumulated 3 or more Failed/Error
              transitions in a rolling 7-day window. WorkflowFailed (above)
              already pages on every individual failure at `warning`; this
              rule escalates to `critical` once failures are a pattern, not
              an isolated blip -- unmitigated, this repeats E1 (68
              consecutive nightly failures, unnoticed for months, because
              nothing distinguished "failed once" from "failing every
              night").
            incident: E1

        # Plan 4 Task T2S1 (P2-final follow-up): trigger-staleness for the
        # two CronWorkflows datalake-alerts.yaml never covered --
        # ingest-sitesonar (daily) and ingest-maintenance (weekly). Same
        # shape and same verified-live metric as IcebergIngestStale above
        # (argo_workflows_cronworkflows_triggered_total{name=...} is the
        # ONLY per-CronWorkflow-name signal this controller version exposes
        # -- this group's header comment), windowed to each schedule's own
        # cadence + a buffer.
        - alert: SiteSonarStale
          expr: increase(argo_workflows_cronworkflows_triggered_total{name="ingest-sitesonar", exported_namespace="argo-workflows"}[26h]) == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: ingest-sitesonar has not even been triggered in 26h
            description: >-
              Same trigger-staleness shape as IcebergIngestStale (this
              group, above) but for the `ingest-sitesonar` CronWorkflow
              (chart/values.yaml's `ingest.schedules.sitesonar`, daily
              03:00 default): 24h cadence + 2h buffer. Detects "the
              schedule stopped firing at all" (controller down, CronWorkflow
              suspended/deleted/renamed); does NOT detect "triggered but
              failed", which WorkflowFailed already covers within 1h.
              `warning`, not `critical`: site-sonar populates auxiliary
              metadata (site_sonar table), not the core job_info/trace/
              mon_jdls_parsed tables IcebergIngestStale protects at
              `critical`.
            incident: E4

        # Plan 4 Task T2S1 (P2-final follow-up) + the P3-final ride-along
        # (deferral-aware constraint): trigger-staleness for
        # `ingest-maintenance` (weekly, chart/values.yaml's
        # `ingest.schedules.maintenance`, Sunday 04:00 default) -- 7d
        # cadence + a day of buffer.
        #
        # Deferral blind spot, documented honestly rather than papered over:
        # `run-trino-maintenance` (ingest/src/alice_ingest/maintenance.py,
        # "P3T3 review Important 1" section) DEFERS -- exits 0, a genuine
        # Succeeded, NOT a failure -- whenever it finds `ingest-nightly`
        # currently Running, to avoid an avoidable Iceberg-OCC commit-
        # conflict cost. A CHRONIC deferral (e.g. nightly wedged Running
        # forever, or the overlap-guard's Running check itself miscounting)
        # would still TRIGGER on schedule every week -- so this alert's
        # trigger-staleness signal stays silent -- while never doing any
        # real maintenance work, and since a deferred run exits 0 the
        # WorkflowFailed/WorkflowChronicFailure phase-based alerts above are
        # blind to it too (Succeeded is Succeeded, whether real or
        # deferred-no-op). Verified-first (this task): no Prometheus-
        # queryable signal exists to distinguish "ran maintenance for real"
        # from "deferred" without a new component -- maintenance.py exposes
        # no metric of its own (same no-new-components decision as
        # RetentionUnverifiedRows/IcebergSnapshotStale above), the only
        # data-side trace of a real run is an Iceberg `replace`-operation
        # snapshot (the same operation column commit 7d5e848's freshness-
        # gate fix filters OUT of check-freshness) which lives in Trino/
        # Iceberg metadata tables Prometheus has no exporter for anywhere in
        # this stack (verified against this cluster's live target/series
        # list: no Trino or Iceberg exporter is scraped). This alert
        # therefore covers ONLY "the schedule stopped firing" -- a human
        # who wants to confirm maintenance is actually EXECUTING (not
        # chronically deferring) still has to read `run-trino-maintenance`
        # pod logs for the `MAINTENANCE DEFERRED: ingest-nightly in flight`
        # line by hand. This gap stays open (reviewer's Plan-4 note); a
        # future fix would need a new component (e.g. a Pushgateway metric
        # from maintenance.py itself), deliberately not added here.
        - alert: IcebergMaintenanceStale
          expr: increase(argo_workflows_cronworkflows_triggered_total{name="ingest-maintenance", exported_namespace="argo-workflows"}[8d]) == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: ingest-maintenance has not even been triggered in 8 days
            description: >-
              argo_workflows_cronworkflows_triggered_total{name="ingest-maintenance"}
              counts TRIGGERS, not successes or real-vs-deferred runs (see
              this alert's own annotation above for the deferral blind
              spot this does NOT cover). increase()==0 over 8d (7d weekly
              cadence + 1d buffer) means the Sunday 04:00 schedule stopped
              firing entirely -- controller down, CronWorkflow suspended/
              deleted/renamed, or an RBAC/namespace issue.
            incident: E4-adjacent
