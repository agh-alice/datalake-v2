# Landing DB replacing the RAID0 VM (design D7). max_connections deliberately
# low: the historical multi-client scaling attempts DDoSed Postgres (E6).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: mon-data
  namespace: landing-db
spec:
  instances: {{ .Values.landingDb.instances }}
  # Digest-pinned per no-mutable-tags convention (Plan-1 final-review N2) --
  # see chart/templates/lakekeeper-db.yaml's comment for the verification
  # method (same digest, same upstream image, both Clusters pin together).
  imageName: ghcr.io/cloudnative-pg/postgresql:16.6@sha256:53be6d727c7b3cf0df2b147f7ce7cdd31d37fd285314294871a4ccc3837b6872
  storage:
    size: {{ .Values.landingDb.storageSize }}
  postgresql:
    parameters:
      max_connections: {{ .Values.landingDb.maxConnections | quote }}
      # E4 (XID wraparound) protection is monitoring, not tuning: the LandingDBXidAgeHigh
      # alert (Task 6 / design D11) + CNPG's exported cnpg_pg_database_xid_age metric.
  bootstrap:
    initdb:
      database: mon_data
      owner: mon_user
  monitoring:
    enablePodMonitor: {{ .Values.landingDb.enablePodMonitor }}
