# Minimal RBAC for Plan 2's CronWorkflows: the emissary executor (Argo
# Workflows v4 default) needs only create/patch on workflowtaskresults to
# report step outcomes back to the controller -- it does not touch the
# Workflow object directly.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline-runner
  namespace: argo-workflows
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pipeline-runner
  namespace: argo-workflows
rules:
  - apiGroups: [argoproj.io]
    resources: [workflowtaskresults]
    verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-runner
  namespace: argo-workflows
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pipeline-runner
subjects:
  - kind: ServiceAccount
    name: pipeline-runner
    namespace: argo-workflows
