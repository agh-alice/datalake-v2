# Plan 2 Task 4: nightly ingestion+retention and site-sonar CronWorkflows.
# Same v4 `schedules:` list schema as chart/templates/hello-cronworkflow.yaml
# (Task 7 finding: legacy singular `schedule` is rejected by the CRDs
# shipped with argo-workflows chart 1.0.19 / app v4.0.7 -- verified via
# `kubectl explain cronworkflow.spec.schedules`), same pipeline-runner
# ServiceAccount + RBAC (chart/templates/workflows-rbac.yaml), same
# ttlStrategy cleanup pattern -- 86400s (24h) here rather than hello's 3600s
# so a failed nightly run's pod/logs survive long enough for a human to
# triage the next morning.
---
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: ingest-nightly
  namespace: argo-workflows
spec:
  schedules: [{{ .Values.ingest.schedules.nightly | quote }}]
  concurrencyPolicy: Forbid
  workflowSpec:
    serviceAccountName: pipeline-runner
    entrypoint: main
    ttlStrategy: {secondsAfterCompletion: 86400}
    # Final-review N5: a stuck run-nightly/run-retention pod previously had
    # no upper bound and would hold concurrencyPolicy: Forbid's slot
    # indefinitely, blocking every later scheduled tick -- see
    # chart/values.yaml's ingest.activeDeadlineSeconds comment.
    activeDeadlineSeconds: {{ .Values.ingest.activeDeadlineSeconds.nightly }}
    templates:
      # 3-step DAG (Plan 3 Task 3 adds check-freshness): run-retention only
      # starts once run-nightly has Succeeded (brief: "retention only after
      # successful ingest -- hard dependency"); check-freshness only starts
      # once run-retention has Succeeded (brief: "check-freshness AFTER
      # run-retention" -- design D11 completion, the data-layer staleness
      # gate documented in alice_ingest.maintenance's module docstring,
      # "Data-layer freshness gate"). Argo's default DAG semantics already
      # enforce this -- a task with `dependencies` does not start unless
      # every dependency succeeded (no continueOn set here), and the DAG
      # itself fails if an earlier step fails, so check-freshness never runs
      # against a partial/failed ingest or retention pass, and a stale/
      # missing core table (check-freshness's own non-zero exit, maintenance.
      # py's run_freshness_check()) fails this Workflow the same way -- both
      # surface through the existing WorkflowFailed alert (datalake-alerts.
      # yaml), no new alerting component needed.
      - name: main
        dag:
          tasks:
            - name: run-nightly
              template: run-nightly
            - name: run-retention
              template: run-retention
              dependencies: [run-nightly]
            - name: check-freshness
              template: check-freshness
              dependencies: [run-retention]
      - name: run-nightly
        container:
          image: {{ .Values.images.ingest }}
          envFrom:
            - secretRef: {name: ingest-env}
          args: ["run-nightly"]
      - name: run-retention
        container:
          image: {{ .Values.images.ingest }}
          envFrom:
            - secretRef: {name: ingest-env}
          args: ["run-retention"]
      - name: check-freshness
        container:
          image: {{ .Values.images.ingest }}
          envFrom:
            - secretRef: {name: ingest-env}
          args: ["check-freshness"]
---
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: ingest-sitesonar
  namespace: argo-workflows
spec:
  schedules: [{{ .Values.ingest.schedules.sitesonar | quote }}]
  concurrencyPolicy: Forbid
  workflowSpec:
    serviceAccountName: pipeline-runner
    entrypoint: main
    ttlStrategy: {secondsAfterCompletion: 86400}
    # Final-review N5 -- see ingest-nightly's activeDeadlineSeconds comment
    # above; sitesonar's unbounded real-cyfronet backlog (sitesonar.py's
    # module docstring) makes a hang here at least as plausible as nightly.
    activeDeadlineSeconds: {{ .Values.ingest.activeDeadlineSeconds.sitesonar }}
    templates:
      - name: main
        container:
          image: {{ .Values.images.ingest }}
          envFrom:
            - secretRef: {name: ingest-env}
          args: ["run-sitesonar"]
---
# Plan 2 Task 5 / Plan 3 Task 3: weekly Iceberg maintenance -- pyiceberg
# metadata-only snapshot expiry (design D12, ingest/src/alice_ingest/
# maintenance.py -- `table.maintenance.expire_snapshots().older_than(...)
# .commit()`, verified live against the pinned pyiceberg 0.11.1) followed by
# Trino PHYSICAL maintenance (`ALTER TABLE ... EXECUTE optimize/
# expire_snapshots/remove_orphan_files` per `alice.*` table -- the file-level
# GC pyiceberg 0.11.1 cannot do; see maintenance.py's module docstring, both
# sections). Same schedules-list/pipeline-runner/ttlStrategy pattern as
# ingest-nightly and ingest-sitesonar above. 2-step DAG (Plan 3 Task 3):
# run-trino-maintenance only starts once run-maintenance (pyiceberg) has
# Succeeded (brief: "maintenance: after the pyiceberg step") -- expiring
# pyiceberg's own snapshot metadata first means Trino's `expire_snapshots`/
# `remove_orphan_files` pass has fewer stale snapshots left to reconcile,
# though each step is independently safe to run alone (both are idempotent).
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: ingest-maintenance
  namespace: argo-workflows
spec:
  schedules: [{{ .Values.ingest.schedules.maintenance | quote }}]
  concurrencyPolicy: Forbid
  workflowSpec:
    serviceAccountName: pipeline-runner
    entrypoint: main
    ttlStrategy: {secondsAfterCompletion: 86400}
    # Final-review N5 -- see ingest-nightly's activeDeadlineSeconds comment
    # above. Covers BOTH steps below (Plan 3 Task 3 extends this Workflow,
    # not the deadline): the pyiceberg expire_snapshots() pass per alice.*
    # table, then Trino's OPTIMIZE/expire_snapshots/remove_orphan_files pass
    # per alice.* table (a real, HTTP-round-tripping SQL engine, slower per
    # table than the metadata-only pyiceberg pass).
    activeDeadlineSeconds: {{ .Values.ingest.activeDeadlineSeconds.maintenance }}
    templates:
      - name: main
        dag:
          tasks:
            - name: run-maintenance
              template: run-maintenance
            - name: run-trino-maintenance
              template: run-trino-maintenance
              dependencies: [run-maintenance]
      - name: run-maintenance
        container:
          image: {{ .Values.images.ingest }}
          envFrom:
            - secretRef: {name: ingest-env}
          args: ["run-maintenance"]
      - name: run-trino-maintenance
        container:
          image: {{ .Values.images.ingest }}
          envFrom:
            - secretRef: {name: ingest-env}
          args: ["run-trino-maintenance"]
