# Design decision D-Dex (deliverables/2026-07-12-datalake-v2-design.md,
# OIDC provider row) + Plan 4 Task 1 Step 4: standalone Dex as its own small
# apps/infra Application, decoupled from ArgoCD's own bundled Dex (which
# stays disabled -- environments/kind/argocd-values.yaml's `dex.enabled:
# false`) and from ArgoCD's v3.5.0-rc2 RC channel. Version-pinned
# independently like every other operator (Recipe B,
# docs/runbooks/adding-a-component.md). Owner-approved 2026-07-12: real
# connector = GitHub, gate = agh-alice org membership -- but a GitHub OAuth
# App client-id/secret requires owner action in the GitHub org UI, which
# cannot be done via API/from this session. So on kind: prove the
# deployment + issuer + a real OIDC-speaking relying party (Grafana) work
# end-to-end using the zero-setup `mockCallback` connector; the real GitHub
# connector block is a documented placeholder for cyfronet
# (docs/runbooks/bootstrap-cyfronet.md's "Dex (GitHub-org OIDC)" section) --
# owner still has to create the OAuth App there.
#
# Pin: dexidp/dex chart 0.24.1 (appVersion v2.44.0) -- newest stable per
# `helm search repo dexidp/dex --versions` against
# https://charts.dexidp.io, added to apps/project.yaml's sourceRepos
# (byte-identical to this file's source.repoURL, per adding-a-component.md
# step 3).
#
# storage.type: memory (not the chart's `kubernetes` CRD-backed storage,
# not Postgres): this deployment's only job on kind is to prove Dex itself
# + the OIDC discovery endpoint + a relying party's OAuth handshake work --
# nothing here needs to survive a pod restart. Revisit at cyfronet if a
# persistent store turns out to matter for the real GitHub connector
# (unverified either way, TO VERIFY at Plan 4 Task 1 Step 4 execution).
#
# staticClients[0] (Grafana): secretEnv, NOT secret -- storage.Client's
# IDEnv/SecretEnv fields (dexidp/dex storage/storage.go, verified against
# source: `json:"idEnv"` / `json:"secretEnv"`, mutually exclusive with
# id/secret, resolved via os.Getenv() at load time, shipped since Dex
# v2.35.0 -- long before this chart's v2.44.0 appVersion) let the actual
# secret value live only in a Kubernetes Secret, never in this Git-tracked
# values block (no-secrets-in-git, this repo's own convention). The env var
# comes from `envFrom` below, sourced from Secret dex/dex-grafana-oauth --
# harness-generated by hack/kind-up.sh on kind (random, thrown away per
# cluster), matching the identical value ALSO written to Secret
# monitoring/dex-grafana-oauth that apps/infra/monitoring.yaml's
# `grafana.envFromSecret` consumes (same shared-secret-two-namespaces
# pattern hack/kind-up.sh already uses for trino_ro's password between the
# landing-db role and the `trino/landing-ro` Secret). Confirmed live
# (dexidp/dex chart 0.24.1's own values.yaml + templates/deployment.yaml):
# `envFrom: [...]` values key renders verbatim as the container's
# `envFrom:` (toYaml passthrough) -- no chart-side name-mangling.
#
# No `config.web` stanza: the chart's own deployment.yaml hardcodes
# `--web-http-addr 0.0.0.0:5556` as a CLI arg regardless of config content
# (verified against the chart's templates/deployment.yaml) -- setting it
# again in config.yaml is redundant and not what the chart's own canonical
# example (ci/config-secret-values.yaml, README.md) does; omitted to match
# verified working usage rather than an untested guess.
#
# issuer keeps the /dex path suffix (upstream's own examples/config-dev.yaml
# convention, `http://127.0.0.1:5556/dex`) even though nothing here sits
# behind a shared ingress yet -- avoids a path change later if cyfronet
# fronts this with an ingress that reuses the same convention.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dex
  namespace: argocd
  annotations: {argocd.argoproj.io/sync-wave: "0"}
spec:
  project: datalake
  source:
    repoURL: https://charts.dexidp.io
    chart: dex
    targetRevision: "0.24.1"
    helm:
      valuesObject:
        config:
          issuer: http://dex.dex.svc.cluster.local:5556/dex
          storage:
            type: memory
          # mock connector: zero setup, proves the OIDC issuer + a relying
          # party's full authorization_code handshake work without any
          # external identity provider or owner-provisioned credential.
          # Real connector for cyfronet (org=agh-alice gate) is a
          # documented placeholder in docs/runbooks/bootstrap-cyfronet.md,
          # not deployed here -- see that runbook for why (owner must
          # create the GitHub OAuth App first; client secret via ESO).
          connectors:
            - type: mockCallback
              id: mock
              name: Example
          staticClients:
            - id: grafana
              name: Grafana
              secretEnv: GRAFANA_OIDC_CLIENT_SECRET
              redirectURIs:
                # kubectl port-forward svc/monitoring-grafana testing
                # pattern (Grafana's default root_url, unset here -- see
                # apps/infra/monitoring.yaml's comment) plus the in-cluster
                # Service DNS form, both accepted since Dex validates the
                # redirect_uri against this exact list.
                - http://localhost:3000/login/generic_oauth
                - http://monitoring-grafana.monitoring.svc.cluster.local/login/generic_oauth
        envFrom:
          - secretRef: {name: dex-grafana-oauth}
  destination: {server: https://kubernetes.default.svc, namespace: dex}
  syncPolicy:
    automated: {prune: true, selfHeal: true}
    syncOptions: [CreateNamespace=true]
