apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: datalake-kind
  namespace: argocd
spec:
  project: datalake
  sourceHydrator:
    drySource:
      repoURL: https://github.com/agh-alice/datalake-v2.git
      targetRevision: main
      path: chart
      helm:
        valueFiles: [values.yaml, values-kind.yaml]
    syncSource:
      targetBranch: environments/kind
      path: chart
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated: {prune: true, selfHeal: true}
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
