apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: argocd
spec:
  project: datalake
  source:
    repoURL: https://charts.min.io/
    chart: minio
    # 5.4.0 is newest per `helm search repo minio/minio --versions` (Task 1,
    # Plan 2). kind-only stand-in for S3 -- not deployed on cyfronet.
    targetRevision: "5.4.0"
    helm:
      valuesObject:
        mode: standalone
        replicas: 1
        persistence:
          size: 5Gi
        resources:
          requests: {memory: 512Mi}
        buckets:
          - {name: warehouse, policy: none}
        # Chart's own Secret template is skipped whenever existingSecret is
        # set (templates/secrets.yaml); every credential consumer resolves
        # the Secret name via the `minio.secretName` helper, which returns
        # existingSecret verbatim. Keys `rootUser`/`rootPassword` are the
        # chart's documented existingSecret contract (verified via `helm
        # show values minio/minio --version 5.4.0`). Secret itself is
        # harness-generated by hack/kind-up.sh -- never inline here.
        existingSecret: minio-creds
  destination: {server: https://kubernetes.default.svc, namespace: minio}
  syncPolicy:
    automated: {prune: true, selfHeal: true}
    syncOptions: [CreateNamespace=true]
