name: ingest-image
on:
  push:
    branches: [main]
    paths:
      - "ingest/**"
      - ".github/workflows/ingest-image.yaml"
permissions:
  contents: read
  packages: write
jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: ingest
          push: true
          tags: ghcr.io/agh-alice/datalake-v2-ingest:${{ github.sha }}
      # Digest is printed, not auto-committed: the chart change is the
      # deploy and must stay reviewable in the rendered-branch diff
      # (deliberate manual pin -- brief Step 6).
      - run: |
          {
            echo "## alice-ingest image"
            echo
            echo "Digest: \`${{ steps.build.outputs.digest }}\`"
            echo
            echo "Paste into \`chart/values.yaml\` \`images.ingest\`:"
            echo '```'
            echo "ghcr.io/agh-alice/datalake-v2-ingest@${{ steps.build.outputs.digest }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
